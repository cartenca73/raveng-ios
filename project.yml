name: Raveng
options:
  bundleIdPrefix: it.raveng
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""    # da impostare in Xcode
    MARKETING_VERSION: "3.0.4"
    CURRENT_PROJECT_VERSION: "9"
    ENABLE_BITCODE: NO
    SWIFT_STRICT_CONCURRENCY: minimal

targets:
  Raveng:
    type: application
    platform: iOS
    sources:
      - path: Raveng
    resources:
      - path: Raveng/Resources/Assets.xcassets
        optional: true
    info:
      path: Raveng/Resources/Info.plist
      properties:
        CFBundleDisplayName: FirmaCDC
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UIRequiresFullScreen: true
        UILaunchScreen:
          UIImageName: ""
          UIImageRespectsSafeAreaInsets: true
          UIColorName: BrandPrimary
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSCameraUsageDescription: "FirmaCDC usa la fotocamera per scansionare documenti da firmare."
        NSFaceIDUsageDescription: "FirmaCDC usa Face ID per proteggere l'accesso ai tuoi documenti firmati."
        NSPhotoLibraryUsageDescription: "FirmaCDC può importare PDF dalla tua libreria per la firma."
        ITSAppUsesNonExemptEncryption: false
    entitlements:
      path: Raveng/Resources/Raveng.entitlements
      properties:
        com.apple.developer.applesignin: [Default]
        com.apple.developer.in-app-payments:
          - merchant.it.raveng.docusign
        keychain-access-groups:
          - $(AppIdentifierPrefix)it.raveng.docusign
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: it.raveng.docusign
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
